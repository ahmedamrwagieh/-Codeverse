<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>CodeVerse | Sign Up</title>





    <link rel="icon" type="image/svg+xml" href="favicon.svg">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">


    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">


    <link rel="stylesheet" href="../CSS/signup.css">
</head>

<body>


    <div class="background-animation">
        <span class="blob b1"></span>
        <span class="blob b2"></span>
        <span class="blob b3"></span>
        <span class="blob b4"></span>
    </div>


    <nav class="navbar fixed-top">
        <div class="container d-flex justify-content-between align-items-center">

            <a class="navbar-brand" href="#">
                <span class="logo-code">Code</span><span class="logo-verse">Verse</span>
            </a>

            <button id="theme-toggle" class="theme-btn" type="button" aria-label="Toggle Theme">
                🌙
            </button>

        </div>
    </nav>



    <section class="signup-section">

        <div class="container">
            <div class="row justify-content-center">

                <div class="col-lg-6">

                    <div class="signup-card">


                        <h2>Create Account</h2>
                        <p>Start your coding journey today</p>


                        <div class="keyword-highlight">
                            Build. Learn. Create.
                        </div>


                        <form id="signupForm" novalidate>


                            <fieldset>
                                <legend>Personal Information</legend>

                                <div class="row g-3">

                                    <div class="col-md-6">
                                        <label>First Name</label>
                                        <input type="text" class="form-control" placeholder="Enter first name"
                                            autocomplete="given-name" required autofocus>
                                    </div>

                                    <div class="col-md-6">
                                        <label>Last Name</label>
                                        <input type="text" class="form-control" placeholder="Enter last name"
                                            autocomplete="family-name" required>
                                    </div>

                                </div>
                            </fieldset>


                            <div class="mt-3">
                                <label>Email Address</label>
                                <input type="email" class="form-control" placeholder="example@email.com"
                                    autocomplete="email" required>
                            </div>


                            <div class="mt-3">
                                <label>Password</label>

                                <div class="password-box">
                                    <input type="password" id="password" class="form-control"
                                        placeholder="Create strong password" autocomplete="new-password" required>

                                    <button type="button" id="togglePassword" aria-label="Show Password">
                                        <i class="bi bi-eye"></i>
                                    </button>
                                </div>
                            </div>


                            <div class="mt-3">
                                <label>Do you want to learn coding?</label>
                                <select class="form-select" required>
                                    <option value="">Select option</option>
                                    <option>Yes, absolutely</option>
                                    <option>Maybe later</option>
                                    <option>No</option>
                                </select>
                            </div>

                            <!-- TERMS -->
                            <div class="form-check mt-3">
                                <input class="form-check-input" type="checkbox" id="terms" required>
                                <label class="form-check-label" for="terms">
                                    I agree to terms & conditions
                                </label>
                            </div>


                            <button type="submit" class="btn btn-primary w-100 mt-4 signup-btn">
                                Create Account
                            </button>

                        </form>


                        <div id="messageBox" class="mt-3"></div>

                    </div>

                </div>

            </div>
        </div>

    </section>
    <footer>

        <div class="container">

            <div class="row">

                <div class="col-lg-6">

                    <h3>

                        <span class="logo-code">Code</span><span class="logo-verse">Verse</span>

                    </h3>

                    <p>

                        Learn Programming The Modern Way.

                    </p>

                </div>

                <div class="col-lg-6 text-lg-end">

                    <a href="#"><i class="bi bi-facebook"></i></a>

                    <a href="#"><i class="bi bi-github"></i></a>

                    <a href="#"><i class="bi bi-linkedin"></i></a>

                    <a href="#"><i class="bi bi-instagram"></i></a>

                </div>

            </div>

            <hr>

            <div class="text-center">

                <p>

                    © 2026 CodeVerse. All Rights Reserved.

                </p>

                <p>

                    Powered by Eng. Ahmed Amr

                </p>

            </div>

        </div>

    </footer>



    <script src="../JS/signup.js"></script>

</body>

</html>
