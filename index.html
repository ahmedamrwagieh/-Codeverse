<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeVerse | Sign Up</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="./signup.css">
</head>

<body>


    <nav class="navbar navbar-expand-lg bg-white shadow-sm fixed-top">

        <div class="container">

            <a class="navbar-brand" href="home.html">

                <img src="logo.jpeg" class="logo-img" alt="CodeVerse">

            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">

                <span class="navbar-toggler-icon"></span>

            </button>

            <div class="collapse navbar-collapse" id="navbarNav">

                <ul class="navbar-nav ms-4">

                    <li class="nav-item">

                        <a class="nav-link" href="home.html">

                            Home

                        </a>

                    </li>

                    <li class="nav-item">

                        <a class="nav-link" href="about.html">

                            About Us

                        </a>

                    </li>

                </ul>

                <form class="d-flex ms-auto me-3">

                    <input class="form-control rounded-pill" type="search" placeholder="Search">

                </form>

                <a href="login.html" class="btn btn-primary rounded-pill me-2">

                    Login

                </a>

                <a href="index.html" class="btn btn-outline-primary rounded-pill">

                    Sign Up

                </a>

            </div>

        </div>

    </nav>

    <section class="login-section">


        <div class="container form-container">

            <div class="row justify-content-center">

                <div class="col-lg-6 col-md-8">

                    <div class="card p-4 shadow-sm border-0">

                        <div class="text-center mb-3">
                            <h2 class="fw-bold text-primary">Create Account</h2>
                            <p class="text-muted">Join CodeVerse</p>
                        </div>

                        <form id="signupForm">

                            <div class="row">

                                <div class="col-md-6 mb-3">
                                    <label class="form-label">First Name</label>
                                    <input type="text" class="form-control" placeholder="First name">
                                </div>

                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Last Name</label>
                                    <input type="text" class="form-control" placeholder="Last name">
                                </div>

                            </div>

                            <div class="mb-3">
                                <label class="form-label">Email</label>
                                <input type="email" class="form-control" placeholder="example@gmail.com">
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Password</label>
                                <input type="password" class="form-control" placeholder="Enter password">
                            </div>

                            <div class="form-check form-switch mb-3">
                                <input class="form-check-input" type="checkbox">
                                <label class="form-check-label">Do you want to learn coding?</label>
                            </div>

                            <div class="form-check mb-3">
                                <input class="form-check-input" type="checkbox">
                                <label class="form-check-label">I agree to terms and conditions</label>
                            </div>

                            <button type="submit" class="btn btn-primary w-100 rounded-pill">
                                Sign Up
                            </button>

                        </form>

                    </div>

                </div>

            </div>

        </div>

        <footer>

            <div class="container">

                <h2>

                    CodeVerse

                </h2>

                <p>

                    Learn HTML, CSS, and JavaScript with interactive courses.

                </p>

                <div class="footer-links">

                    <a href="home.html">Home</a>

                    <a href="#">Courses</a>

                    <a href="about.html">About Us</a>

                    <a href="#">Contact</a>

                </div>

                <hr>

                <p>

                    © 2026 CodeVerse. All Rights Reserved.

                </p>

                <p>

                    Powered by Eng: Ahmed Amr

                </p>

            </div>

        </footer>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
        <div id="toast" class="toast">
            🎉 Account Created Successfully! Welcome to CodeVerse.
        </div>
        <script src="signup.js"></script>

</body>

</html>
